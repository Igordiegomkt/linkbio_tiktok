<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Exclusivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* SETA */

.top-arrow{
position:fixed;
top:15px;
right:15px;
z-index:1000;
animation:bounce .8s infinite;
}

.top-arrow span{
font-size:55px;
filter:drop-shadow(0 0 15px #ff3b3b);
display:block;
}

.top-arrow p{
font-size:0.7rem;
font-weight:900;
color:#ff3b3b;
margin-top:-5px;
}

/* animação */

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* container */

.container{
width:100%;
max-width:420px;
padding:20px;
text-align:center;
}

.main-card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.1);
border-radius:30px;
padding:25px;
backdrop-filter:blur(15px);
}

/* loader */

.loader-container{
margin-bottom:25px;
}

.loader-text{
font-size:.8rem;
color:#ff3b3b;
font-weight:700;
margin-bottom:8px;
text-transform:uppercase;
letter-spacing:1px;
}

.progress-bar{
width:100%;
height:10px;
background:#111;
border-radius:10px;
border:1px solid #333;
overflow:hidden;
}

.progress-fill{
width:0%;
height:100%;
background:linear-gradient(to right,#ff3b3b,#ff0000);
box-shadow:0 0 15px rgba(255,59,59,.5);
transition:width 3s linear;
}

h1{
font-size:1.4rem;
margin-bottom:20px;
font-weight:900;
}

/* passos */

.text-steps{
text-align:left;
margin-bottom:20px;
}

.step{
display:flex;
align-items:center;
gap:12px;
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:12px;
margin-bottom:8px;
}

.step-n{
background:#ff3b3b;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:.75rem;
font-weight:900;
}

.step-txt{
font-size:.85rem;
color:#ddd;
}

.step-txt b{
color:#ff3b3b;
}

.gif-box{
width:100%;
border-radius:15px;
overflow:hidden;
margin-bottom:20px;
border:2px solid #222;
}

.gif-box img{
width:100%;
display:block;
}

/* botão */

.btn-check{
display:none;
width:100%;
background:#fff;
color:#000;
border:none;
padding:18px;
border-radius:15px;
font-weight:900;
font-size:1rem;
cursor:pointer;
text-transform:uppercase;
animation:slideUp .4s ease-out;
}

@keyframes slideUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* aviso navegador */

.browser-warning{
display:none;
background:#ff3b3b;
padding:10px;
border-radius:10px;
font-size:.8rem;
margin-bottom:15px;
font-weight:700;
}

</style>
</head>

<body onload="initLoader()">

<div class="top-arrow">
<span>↗️</span>
<p>Clique aqui</p>
</div>

<div class="container">

<div class="main-card">

<div id="browserWarning" class="browser-warning">
⚠️ Abra no navegador para liberar o acesso
</div>

<div class="loader-container">

<div class="loader-text" id="status">
Validando seu acesso...
</div>

<div class="progress-bar">
<div class="progress-fill" id="bar"></div>
</div>

</div>

<h1>SIGA ESTES PASSOS:</h1>

<div class="text-steps">

<div class="step">
<div class="step-n">1</div>
<div class="step-txt">Toque nos <b>3 Pontos</b> no topo direito.</div>
</div>

<div class="step">
<div class="step-n">2</div>
<div class="step-txt">Clique em <b>"Abrir no Navegador"</b>.</div>
</div>

<div class="step">
<div class="step-n">3</div>
<div class="step-txt">Clique no <b>botão branco</b> abaixo.</div>
</div>

</div>

<div class="gif-box">
<img src="https://i.imgur.com/kUc695D.gif">
</div>

<button class="btn-check" id="btnAction" onclick="goToLink()">
JÁ FIZ OS PASSOS ACIMA
</button>

</div>
</div>

<script>

/* loader */

function initLoader(){

const bar=document.getElementById('bar');
const status=document.getElementById('status');
const btn=document.getElementById('btnAction');

setTimeout(()=>{
bar.style.width='100%';
},100);

setTimeout(()=>{
status.innerHTML="VERIFICAÇÃO COMPLETA!";
status.style.color="#00ff88";
btn.style.display='block';
},3100);

detectBrowser();

}

/* detectar navegador tiktok */

function detectBrowser(){

const ua=navigator.userAgent;

if(ua.includes("TikTok")||ua.includes("Instagram")){

document.getElementById("browserWarning").style.display="block";

}

}

/* redirecionar */

function goToLink(){

const params=window.location.search;

let url="https://paylume.fans/b/meuslinktiktok";

if(params){

url+=params;

}

window.location.href=url;

}

</script>

</body>
</html>
